repos:
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --show-fixes]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uvx ty check src tests
        language: system
        pass_filenames: false
      - id: check-encoding
        name: check encoding
        entry: uv run python tools/check_encoding.py
        language: system
        pass_filenames: false
      # Runs before uncoded so the generated skill files are built from
      # already-formatted sources. The generated skill dirs are excluded
      # because uncoded sync owns those files.
      - id: prettier
        name: format markdown with prettier
        entry: prettier
        language: node
        additional_dependencies: ["prettier@3.8.1"]
        args: ["--write"]
        files: \.md$
        exclude: ^(CLAUDE\.md|(\.claude|\.agents)/skills/.*)$
      - id: uncoded
        name: uncoded
        entry: uv run uncoded sync
        language: system
        pass_filenames: false
