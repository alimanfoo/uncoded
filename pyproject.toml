[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "uncoded"
dynamic = ["version"]
description = "Static symbol indexes for AI-assisted code navigation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "Alistair Miles", email = "alimanfoo@googlemail.com" },
]
dependencies = [
    "pyyaml>=6.0",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
dev = [
    "pre-commit>=3.0",
    "pytest>=8.0",
]

[project.scripts]
uncoded = "uncoded.cli:main"

[project.urls]
Homepage = "https://github.com/alimanfoo/uncoded"
Repository = "https://github.com/alimanfoo/uncoded"

[tool.hatch.version]
source = "vcs"

[tool.uncoded]
source-roots = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
src = ["src"]
line-length = 88
extend-exclude = [".uncoded"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
